{% load static %}<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión · Proyecto Córdoba</title>
  <link rel="stylesheet" href="{% static 'css/app.css' %}" />
</head>
<body class="h-full bg-slate-50">
  <main class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-sm text-center bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
      <img src="{% static 'icons/icon-192.png' %}" alt="Proyecto Córdoba" class="w-16 h-16 mx-auto mb-4 rounded-2xl" />
      <h1 class="text-xl font-bold text-slate-900 mb-2">Sin conexión</h1>
      <p class="text-sm text-slate-600 mb-6">
        No hay internet en este momento. El ticket que quieras cargar
        no se pierde: sacale la foto con la cámara del teléfono y subila
        cuando vuelva la conexión.
      </p>
      <button onclick="location.reload()"
              class="w-full py-2.5 rounded-lg font-medium text-sm text-white bg-primary-600 hover:bg-primary-700">
        Reintentar
      </button>
    </div>
  </main>
</body>
</html>
