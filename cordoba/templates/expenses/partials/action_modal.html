{% load currency_tags %}
<!-- Modal overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4"
     id="action-modal-overlay"
     onclick="if(event.target===this)closeModal()">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>

  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md z-10">

    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
      <div class="flex items-center gap-2">
        {% if action == 'reject' %}
          <i data-lucide="x-circle" class="h-5 w-5 text-red-500"></i>
          <h3 class="font-semibold text-slate-900">{{ action_label }} gasto</h3>
        {% else %}
          <i data-lucide="message-square" class="h-5 w-5 text-blue-500"></i>
          <h3 class="font-semibold text-slate-900">{{ action_label }} gasto</h3>
        {% endif %}
      </div>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
        <i data-lucide="x" class="h-5 w-5"></i>
      </button>
    </div>

    <!-- Datos del gasto -->
    <div class="px-6 py-3 bg-slate-50 border-b border-slate-100">
      <p class="text-sm text-slate-600">
        <span class="font-medium">{{ expense.visit.patient }}</span>
        · {{ expense.get_category_display }}
        · ${{ expense.amount|ars }}
        · {{ expense.expense_date|date:"d/m/Y" }}
      </p>
    </div>

    <!-- Formulario -->
    <form
      hx-post="{% if action == 'reject' %}{% url 'expenses:reject' expense.pk %}{% else %}{% url 'expenses:observe' expense.pk %}{% endif %}"
      hx-target="#expense-row-{{ expense.pk }}"
      hx-swap="outerHTML"
      hx-on::after-request="if(event.detail.successful) closeModal()"
      class="px-6 py-4">

      {% csrf_token %}

      <label class="block text-sm font-medium text-slate-700 mb-1.5">
        {% if action == 'reject' %}Motivo del rechazo <span class="text-red-500">*</span>{% else %}Comentario de observación <span class="text-red-500">*</span>{% endif %}
      </label>
      <textarea
        name="notes"
        required
        rows="3"
        placeholder="{{ placeholder }}"
        class="w-full px-3 py-2.5 rounded-lg border border-slate-300 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
        autofocus></textarea>

      <div id="modal-error-{{ expense.pk }}" class="mt-1"></div>

      <div class="flex gap-3 mt-4">
        <button type="submit"
          class="flex-1 py-2.5 rounded-lg font-medium text-sm text-white transition-colors
            {% if action == 'reject' %}bg-red-600 hover:bg-red-700{% else %}bg-blue-600 hover:bg-blue-700{% endif %}">
          {{ action_label }}
        </button>
        <button type="button" onclick="closeModal()"
          class="flex-1 py-2.5 rounded-lg font-medium text-sm text-slate-700 bg-slate-100 hover:bg-slate-200 transition-colors">
          Cancelar
        </button>
      </div>
    </form>

  </div>
</div>

<script>
  // Initialize Lucide icons for dynamically loaded content
  if (typeof lucide !== 'undefined') lucide.createIcons();
</script>
